<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filtro Documento</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --bg:#eef0f5;--panel:#ffffff;--panel2:#f4f5f8;--border:#dde0e8;--border2:#c8cbd6;
  --accent:#2b579a;--accent2:#1e4080;--accent-lt:rgba(43,87,154,0.09);
  --text:#1a1c24;--muted:#6b7080;--muted2:#9198a8;
  --green:#27ae60;--green-lt:rgba(39,174,96,0.1);
  --red:#c0392b;--red-lt:rgba(192,57,43,0.08);
  --shadow-sm:0 1px 4px rgba(0,0,0,0.07);--shadow-md:0 4px 16px rgba(0,0,0,0.09);
  --radius:12px;--radius-sm:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;}

.app-header{background:var(--accent);height:50px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
.app-logo{display:flex;align-items:center;gap:10px;color:#fff;font-weight:700;font-size:1rem;}
.logo-icon{width:30px;height:30px;background:rgba(255,255,255,0.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.header-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:#fff;border-radius:var(--radius-sm);padding:6px 12px;font-size:0.78rem;font-weight:500;cursor:pointer;transition:background 0.15s;}
.header-btn:hover{background:rgba(255,255,255,0.25);}

.status-bar{background:var(--panel);border-bottom:1px solid var(--border);padding:8px 20px;font-size:0.75rem;color:var(--muted);display:flex;align-items:center;gap:6px;min-height:34px;}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.progress-bar-wrap{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;display:none;}
.progress-bar-wrap.show{display:block;}
.progress-bar{height:100%;background:var(--accent);border-radius:2px;transition:width 0.2s;width:0%;}

.main-content{max-width:900px;margin:0 auto;padding:20px 16px 80px;}
.top-actions{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.btn-action{display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px 20px;background:var(--panel);border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all 0.18s;font-size:0.75rem;color:var(--muted);font-weight:500;min-width:90px;box-shadow:var(--shadow-sm);}
.btn-action:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-lt);transform:translateY(-2px);box-shadow:var(--shadow-md);}
.btn-action .act-icon{font-size:1.6rem;}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.card{background:var(--panel);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden;transition:box-shadow 0.18s,transform 0.18s;}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.card-preview{height:120px;background:var(--panel2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;cursor:pointer;}
.card-preview .preview-placeholder{font-size:2.5rem;opacity:0.25;pointer-events:none;}
.card-preview img{width:100%;height:100%;object-fit:cover;pointer-events:none;}
.card-body{padding:12px 14px;}
.card-name{font-weight:600;font-size:0.9rem;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
.card-name:hover{color:var(--accent);}
.card-meta{font-size:0.72rem;color:var(--muted2);margin-bottom:10px;}
.card-badges{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.badge{font-size:0.68rem;font-weight:600;padding:3px 8px;border-radius:20px;display:flex;align-items:center;gap:3px;}
.badge-original{background:var(--accent-lt);color:var(--accent);border:1px solid rgba(43,87,154,0.2);}
.badge-filtrado{background:var(--green-lt);color:var(--green);border:1px solid rgba(39,174,96,0.25);}
.badge-vacio{background:var(--panel2);color:var(--muted2);border:1px solid var(--border);}
.card-actions{display:flex;gap:5px;}
.btn-card{flex:1;padding:6px 4px;border-radius:6px;border:1px solid var(--border);background:var(--panel2);color:var(--muted);font-size:0.7rem;font-weight:500;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:3px;white-space:nowrap;}
.btn-card:hover{background:var(--accent-lt);border-color:var(--accent);color:var(--accent);}
.btn-card:disabled{opacity:0.3;cursor:not-allowed;}
.btn-card.btn-process{background:var(--accent);color:#fff;border-color:var(--accent2);}
.btn-card.btn-process:hover{background:var(--accent2);}
.btn-card.btn-del{color:var(--red);border-color:rgba(192,57,43,0.2);}
.btn-card.btn-del:hover{background:var(--red-lt);border-color:var(--red);}

/* Menú plegable de tarjeta */
.card-menu-wrap{position:relative;}
.card-menu-btn{flex:none;width:30px;padding:6px 4px;border-radius:6px;border:1px solid var(--border);background:var(--panel2);color:var(--muted);font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
.card-menu-btn:hover{background:var(--accent-lt);border-color:var(--accent);color:var(--accent);}
.card-menu-dropdown{display:none;position:absolute;bottom:calc(100% + 6px);right:0;background:var(--panel);border:1.5px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow-md);min-width:180px;z-index:50;overflow:hidden;animation:dropIn 0.15s ease;}
.card-menu-dropdown.show{display:block;}
@keyframes dropIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.card-menu-item{display:flex;align-items:center;justify-content:center;gap:8px;padding:9px 14px;font-size:0.8rem;color:var(--text);cursor:pointer;transition:background 0.12s;border:none;background:transparent;width:100%;text-align:center;font-family:inherit;}
.card-menu-item:hover{background:var(--accent-lt);color:var(--accent);}
.card-menu-item:disabled{opacity:0.35;cursor:not-allowed;}
.card-menu-item:disabled:hover{background:transparent;color:var(--text);}
.card-menu-item.danger{color:var(--red);}
.card-menu-item.danger:hover{background:var(--red-lt);}
.card-menu-sep{height:1px;background:var(--border);margin:4px 0;}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted2);grid-column:1/-1;}
.empty-state .es-icon{font-size:3rem;margin-bottom:12px;opacity:0.3;}
.empty-state p{font-size:0.88rem;}

/* Panel ajustes */
.overlay-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:300;backdrop-filter:blur(2px);}
.overlay-bg.show{display:block;}
.panel-ajustes{position:fixed;top:0;right:0;width:min(320px,100vw);height:100vh;background:var(--panel);border-left:1px solid var(--border);box-shadow:-4px 0 24px rgba(0,0,0,0.12);z-index:400;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.28s cubic-bezier(.4,0,.2,1);overflow:hidden;}
.panel-ajustes.show{transform:translateX(0);}
.panel-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--accent);flex-shrink:0;}
.panel-header span{color:#fff;font-weight:600;font-size:0.9rem;}
.panel-close{background:rgba(255,255,255,0.2);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;}
.panel-close:hover{background:rgba(255,255,255,0.35);}
.panel-body{flex:1;overflow-y:auto;padding:16px;}
.panel-body::-webkit-scrollbar{width:4px;}
.panel-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.ps-title{font-size:0.68rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.ps-title::after{content:'';flex:1;height:1px;background:var(--border);}
.ps-sep{height:1px;background:var(--border);margin:14px 0;}
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px;}
.btn-preset{padding:7px 6px;font-size:0.75rem;font-weight:500;border:1.5px solid var(--border2);background:var(--panel2);color:var(--muted);border-radius:7px;cursor:pointer;transition:all 0.15s;text-align:center;}
.btn-preset:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-lt);}
.btn-preset.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
.slider-group{display:flex;flex-direction:column;gap:11px;}
.slider-item label{display:flex;justify-content:space-between;font-size:0.78rem;color:var(--muted);font-weight:500;margin-bottom:5px;}
.slider-item label .val{color:var(--accent);font-weight:600;font-variant-numeric:tabular-nums;}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;border-radius:2px;background:var(--border);outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px rgba(43,87,154,0.15);}
input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;}
.check-row{display:flex;align-items:center;gap:8px;font-size:0.8rem;color:var(--muted);cursor:pointer;padding:4px 0;user-select:none;}
.check-row input{accent-color:var(--accent);width:14px;height:14px;}
.panel-btn-row{display:flex;gap:6px;margin-top:12px;}
.pbtn{flex:1;padding:8px;border-radius:6px;font-size:0.78rem;font-weight:500;cursor:pointer;border:none;transition:all 0.15s;}
.pbtn-primary{background:var(--accent);color:#fff;}
.pbtn-primary:hover{background:var(--accent2);}
.pbtn-ghost{background:var(--panel2);color:var(--muted);border:1px solid var(--border2);}
.pbtn-ghost:hover{background:var(--border);color:var(--text);}
.fmt-row{display:flex;gap:6px;margin-bottom:10px;}
.fmt-btn{flex:1;padding:6px;font-size:0.74rem;font-weight:500;border:1px solid var(--border2);background:var(--panel2);color:var(--muted);border-radius:6px;cursor:pointer;transition:all 0.15s;}
.fmt-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-lt);font-weight:600;}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
.modal-overlay.show{display:flex;}
.modal{background:var(--panel);border-radius:var(--radius);box-shadow:0 8px 40px rgba(0,0,0,0.2);width:min(400px,92vw);overflow:hidden;animation:modalIn 0.2s ease;}
@keyframes modalIn{from{opacity:0;transform:scale(0.95) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-header{background:var(--accent);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;}
.modal-header span{color:#fff;font-weight:600;font-size:0.9rem;}
.modal-header button{background:rgba(255,255,255,0.2);border:none;color:#fff;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;}
.modal-header button:hover{background:rgba(255,255,255,0.35);}
.modal-body{padding:20px 18px;}
.modal-opt{display:flex;align-items:center;gap:14px;padding:14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;margin-bottom:10px;transition:all 0.15s;background:var(--panel2);}
.modal-opt:hover{border-color:var(--accent);background:var(--accent-lt);}
.modal-opt:last-child{margin-bottom:0;}
.modal-opt .opt-icon{font-size:1.8rem;flex-shrink:0;}
.modal-opt .opt-text strong{display:block;font-size:0.85rem;color:var(--text);margin-bottom:3px;}
.modal-opt .opt-text span{font-size:0.75rem;color:var(--muted);}

/* Visor */
.visor-overlay{display:none;position:fixed;inset:0;background:#111;z-index:600;flex-direction:column;}
.visor-overlay.show{display:flex;}
.visor-header{background:rgba(0,0,0,0.75);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.visor-header span{color:#fff;font-size:0.85rem;font-weight:500;}
.visor-header-btns{display:flex;gap:8px;}
.visor-close{background:rgba(255,255,255,0.15);border:none;color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:0.8rem;transition:background 0.15s;}
.visor-close:hover{background:rgba(255,255,255,0.28);}
.visor-body{flex:1;overflow-y:auto;padding:12px;}
.visor-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:860px;margin:0 auto;}
.visor-sentinel{grid-column:1/-1;height:40px;}
.visor-loader{grid-column:1/-1;text-align:center;padding:16px;color:rgba(255,255,255,0.5);font-size:0.8rem;}

.img-wrap{position:relative;cursor:pointer;}
.img-wrap img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:block;transition:transform 0.15s;pointer-events:auto;cursor:zoom-in;}
.img-wrap:hover img{transform:scale(1.02);}
.img-wrap.selected img{outline:3px solid #fff;outline-offset:2px;transform:scale(0.95);}
.img-check{position:absolute;top:6px;left:6px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,0.4);border:2px solid rgba(255,255,255,0.6);display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;pointer-events:auto;cursor:pointer;transition:background 0.15s,transform 0.1s;z-index:2;}
.img-check:hover{transform:scale(1.15);background:rgba(0,0,0,0.65);}
.img-wrap.selected .img-check{background:var(--accent);border-color:var(--accent);}
.img-wrap.selected .img-check::after{content:'✓';font-weight:700;}

.visor-toolbar{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.82);backdrop-filter:blur(8px);padding:10px 16px;display:flex;align-items:center;gap:8px;border-top:1px solid rgba(255,255,255,0.1);transform:translateY(100%);transition:transform 0.22s ease;flex-wrap:wrap;}
.visor-toolbar.show{transform:translateY(0);}
.vtbtn{padding:7px 13px;border-radius:7px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.12);color:#fff;font-size:0.78rem;font-weight:500;cursor:pointer;transition:background 0.15s;}
.vtbtn:hover{background:rgba(255,255,255,0.22);}
.vtbtn.vtbtn-accent{background:var(--accent);border-color:var(--accent2);}
.vtbtn.vtbtn-accent:hover{background:var(--accent2);}
.vtbtn.vtbtn-warn{background:rgba(230,126,34,0.85);border-color:transparent;}
.vtbtn.vtbtn-warn:hover{background:rgba(230,126,34,1);}
.vt-sel-count{font-size:0.75rem;color:rgba(255,255,255,0.7);margin-right:auto;}

/* Crop manual */
.crop-overlay{display:none;position:fixed;inset:0;background:#000;z-index:700;flex-direction:column;}
.crop-overlay.show{display:flex;}
.crop-header{display:flex;align-items:center;padding:10px 12px;background:rgba(0,0,0,0.75);flex-shrink:0;gap:8px;}
.crop-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;background:#111;touch-action:none;}
#cropCanvas{display:block;max-width:100%;max-height:calc(100vh - 110px);touch-action:none;cursor:crosshair;}
.crop-acciones{display:flex;gap:8px;padding:10px 12px;background:rgba(0,0,0,0.75);flex-shrink:0;justify-content:center;flex-wrap:wrap;}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
@media(max-width:500px){.cards-grid{grid-template-columns:1fr 1fr;}.btn-action{min-width:70px;padding:12px 10px;}}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-logo"><div class="logo-icon">📄</div>Filtro Documento</div>
  <button class="header-btn" onclick="togglePanelAjustes()">⚙️ Ajustes</button>
</header>

<div class="status-bar">
  <div class="status-dot"></div>
  <span id="statusText">Listo</span>
  <div class="progress-bar-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
</div>

<div class="main-content">
  <div class="top-actions">
    <button class="btn-action" onclick="abrirModalNueva()"><span class="act-icon">➕</span>Nueva tarjeta</button>
    <button class="btn-action" onclick="importarZip()"><span class="act-icon">📦</span>Importar ZIP</button>
    <button class="btn-action" onclick="importarImagenes()"><span class="act-icon">🖼️</span>Importar imágenes</button>
  </div>
  <div class="cards-grid" id="cardsGrid">
    <div class="empty-state"><div class="es-icon">📂</div><p>Sin tarjetas aún.<br>Crea una nueva para comenzar.</p></div>
  </div>
</div>

<!-- Panel ajustes -->
<div class="overlay-bg" id="overlayBg" onclick="cerrarPanelAjustes()"></div>
<div class="panel-ajustes" id="panelAjustes">
  <div class="panel-header"><span>⚙️ Ajustes de filtro</span><button class="panel-close" onclick="cerrarPanelAjustes()">✕</button></div>
  <div class="panel-body">
    <div class="ps-title">Presets <span id="savedBadge" style="font-size:0.68rem;color:var(--green);margin-left:4px;opacity:0;transition:opacity 0.2s;font-weight:600">✓ Guardado</span></div>
    <div class="preset-grid">
      <button class="btn-preset active" data-preset="documento">📄 Documento</button>
      <button class="btn-preset" data-preset="fotocopia">🖨️ Fotocopia</button>
      <button class="btn-preset" data-preset="suave">🌤️ Suave</button>
      <button class="btn-preset" data-preset="original">🔲 Original</button>
    </div>
    <div class="ps-title">Ajustes</div>
    <div class="slider-group">
      <div class="slider-item"><label>Contraste <span class="val" id="valContraste">160%</span></label><input type="range" id="sContraste" min="50" max="300" value="160"></div>
      <div class="slider-item"><label>Brillo <span class="val" id="valBrillo">90%</span></label><input type="range" id="sBrillo" min="20" max="200" value="90"></div>
      <div class="slider-item"><label>Saturación <span class="val" id="valSaturacion">40%</span></label><input type="range" id="sSaturacion" min="0" max="200" value="40"></div>
      <div class="slider-item"><label>Sepia <span class="val" id="valSepia">15%</span></label><input type="range" id="sSepia" min="0" max="100" value="15"></div>
      <div class="slider-item"><label>Nitidez <span class="val" id="valSharp">0</span></label><input type="range" id="sSharp" min="0" max="5" step="0.5" value="0"></div>
      <div class="slider-item"><label>Umbral B&N <span class="val" id="valThresh">OFF</span></label><input type="range" id="sThresh" min="0" max="255" value="0"></div>
      <div class="slider-item"><label>Escala salida <span class="val" id="valEscala">100%</span></label><input type="range" id="sEscala" min="20" max="100" value="100"></div>
    </div>
    <div style="margin-top:10px">
      <label class="check-row"><input type="checkbox" id="chkGris"> Escala de grises</label>
      <label class="check-row"><input type="checkbox" id="chkInvert"> Invertir colores</label>
      <label class="check-row"><input type="checkbox" id="chkAdaptativo"> Umbral adaptativo (fotocopia)</label>
    </div>
    <div class="panel-btn-row">
      <button class="pbtn pbtn-primary" onclick="guardarPresetActual()">💾 Guardar preset</button>
      <button class="pbtn pbtn-ghost" onclick="restaurarPresetDefecto()">🔄 Defecto</button>
    </div>
    <div class="ps-sep"></div>
    <div class="ps-title">Exportar</div>
    <div class="fmt-row">
      <button class="fmt-btn active" data-fmt="jpeg">JPEG</button>
      <button class="fmt-btn" data-fmt="png">PNG</button>
      <button class="fmt-btn" data-fmt="webp">WEBP</button>
    </div>
    <div class="slider-item"><label>Calidad <span class="val" id="valCalidad">92%</span></label><input type="range" id="sCalidad" min="10" max="100" value="92"></div>
  </div>
</div>

<!-- Modal nueva tarjeta -->
<div class="modal-overlay" id="modalNueva">
  <div class="modal">
    <div class="modal-header"><span>➕ Nueva tarjeta</span><button onclick="cerrarModalNueva()">✕</button></div>
    <div class="modal-body">
      <div class="modal-opt" onclick="cerrarModalNueva();importarZip()">
        <div class="opt-icon">📦</div><div class="opt-text"><strong>Importar ZIP</strong><span>Selecciona un archivo .zip con imágenes</span></div>
      </div>
      <div class="modal-opt" onclick="cerrarModalNueva();importarImagenes()">
        <div class="opt-icon">🖼️</div><div class="opt-text"><strong>Importar imágenes</strong><span>Selecciona imágenes sueltas (JPG, PNG, WEBP)</span></div>
      </div>

<script>
'use strict';

/* ═══ 1. PRESETS ═══ */
const FILTRO_KEY='filtro_documentos_presets';
const FMT_KEY='filtro_documentos_fmt';
const PRESETS_DEFAULT={
  documento:{contraste:160,brillo:90,saturacion:40,sepia:15,sharp:0,thresh:0,escala:100,gris:false,invert:false},
  fotocopia:{contraste:180,brillo:105,saturacion:0,sepia:0,sharp:1,thresh:0,escala:100,gris:true,invert:false,adaptativo:true},
  suave:{contraste:120,brillo:105,saturacion:70,sepia:5,sharp:0,thresh:0,escala:100,gris:false,invert:false},
  original:{contraste:100,brillo:100,saturacion:100,sepia:0,sharp:0,thresh:0,escala:100,gris:false,invert:false},
};
function cargarPresets(){
  try{const s=localStorage.getItem(FILTRO_KEY);if(s){const p=JSON.parse(s);const b=JSON.parse(JSON.stringify(PRESETS_DEFAULT));Object.keys(b).forEach(k=>{if(p[k])Object.assign(b[k],p[k]);});return b;}}catch(e){}
  return JSON.parse(JSON.stringify(PRESETS_DEFAULT));
}
function persistirPresets(){localStorage.setItem(FILTRO_KEY,JSON.stringify(PRESETS));}
const PRESETS=cargarPresets();
let presetActivo='documento';
const filtros={...PRESETS.documento,calidad:92};
let fmtActivo=localStorage.getItem(FMT_KEY)||'jpeg';

}
function syncSliders(){

['sContraste','sBrillo','sSaturacion','sSepia','sSharp','sThresh','sEscala','sCalidad'].forEach(id=>{

/* ═══ 2. STATUS ═══ */
function setStatus(msg){document.getElementById('statusText').textContent=msg;}

/* ═══ 3. INDEXEDDB ═══ */
const DB_NAME='FiltroDocumentosDB',DB_VER=1,STORE='tarjetas';
let db=null;
function abrirDB(){
  return new Promise((res,rej)=>{
    if(db){res(db);return;}
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{if(!e.target.result.objectStoreNames.contains(STORE))e.target.result.createObjectStore(STORE,{keyPath:'id'});};
    req.onsuccess=e=>{db=e.target.result;res(db);};
    req.onerror=e=>rej(e.target.error);
  });
}
async function dbGuardar(t){const d=await abrirDB();return new Promise((res,rej)=>{const tx=d.transaction(STORE,'readwrite');tx.objectStore(STORE).put(t);tx.oncomplete=res;tx.onerror=e=>rej(e.target.error);});}
async function dbListar(){const d=await abrirDB();return new Promise((res,rej)=>{const req=d.transaction(STORE,'readonly').objectStore(STORE).getAll();req.onsuccess=e=>res(e.target.result);req.onerror=e=>rej(e.target.error);});}
async function dbObtener(id){const d=await abrirDB();return new Promise((res,rej)=>{const req=d.transaction(STORE,'readonly').objectStore(STORE).get(id);req.onsuccess=e=>res(e.target.result);req.onerror=e=>rej(e.target.error);});}
async function dbEliminar(id){const d=await abrirDB();return new Promise((res,rej)=>{const tx=d.transaction(STORE,'readwrite');tx.objectStore(STORE).delete(id);tx.oncomplete=res;tx.onerror=e=>rej(e.target.error);});}

/* ═══ 4. UTIL ═══ */
function uuid(){return crypto.randomUUID?crypto.randomUUID():'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16);});}
function fechaCorta(ts){const d=new Date(ts);return d.toLocaleDateString('es-SV',{day:'2-digit',month:'2-digit',year:'2-digit'})+' '+d.toLocaleTimeString('es-SV',{hour:'2-digit',minute:'2-digit'});}

/* ═══ 5. CREAR TARJETAS ═══ */
async function crearTarjetaDesdeZip(file){

  await dbGuardar(t);setStatus(`✅ Tarjeta "${t.nombre}" creada`);return t;
}

  const t={id:uuid(),nombre,fecha:Date.now(),zipOriginalBlob:blob,zipFiltradoBlob:null,presetUsado:null,nombreArchivoOrig:`orig_${uuid()}.zip`,nombreArchivoFilt:null};
  await dbGuardar(t);setStatus(`✅ Tarjeta "${nombre}" creada con ${files.length} imágenes`);return t;
}

/* ═══ 6. PROCESAR ═══ */
const canvasOff=document.getElementById('canvasOff');
function aplicarFiltroACanvas(src){
  const f=filtros,s=f.escala/100,w=Math.round(src.width*s),h=Math.round(src.height*s);
  const out=document.createElement('canvas');out.width=w;out.height=h;
  const ctx=out.getContext('2d');
  const css=[`contrast(${f.contraste}%)`,`brightness(${f.brillo}%)`,f.gris?'grayscale(100%)':`saturate(${f.saturacion}%)`,`sepia(${f.sepia}%)`,f.invert?'invert(100%)':''].filter(Boolean).join(' ');
  ctx.filter=css;ctx.drawImage(src,0,0,w,h);ctx.filter='none';
  if(f.sharp>0)applySharp(ctx,w,h,f.sharp);
  if(f.adaptativo)applyAdaptativeThreshold(ctx,w,h);
  else if(f.thresh>0)applyThreshold(ctx,w,h,f.thresh);
  return out;
}
function applySharp(ctx,w,h,amount){
  const d=ctx.getImageData(0,0,w,h);const src=new Uint8ClampedArray(d.data);const k=amount*0.3;
  for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){const i=(y*w+x)*4;for(let c=0;c<3;c++){const l=-src[i-w*4+c]-src[i-4+c]+5*src[i+c]-src[i+4+c]-src[i+w*4+c];d.data[i+c]=Math.max(0,Math.min(255,src[i+c]+l*k/4));}d.data[i+3]=src[i+3];}
  ctx.putImageData(d,0,0);
}
function applyThreshold(ctx,w,h,thr){
  const d=ctx.getImageData(0,0,w,h);
  for(let i=0;i<d.data.length;i+=4){const v=(0.299*d.data[i]+0.587*d.data[i+1]+0.114*d.data[i+2])>=thr?255:0;d.data[i]=d.data[i+1]=d.data[i+2]=v;}
  ctx.putImageData(d,0,0);
}

// Threshold adaptativo: compara cada pixel con la media local de su zona
function applyAdaptativeThreshold(ctx,w,h){
  const src=ctx.getImageData(0,0,w,h);
  const out=ctx.createImageData(w,h);
  const s=src.data, d=out.data;

  // Tamaño de bloque local: ~1/20 de la imagen, mínimo 15px
  const radio=Math.max(15,Math.round(Math.min(w,h)/20));

  // Calcular tabla de suma acumulada (integral image) de luminancia
  const lum=new Float32Array(w*h);
  for(let i=0;i<w*h;i++){
    const p=i*4;
    lum[i]=0.299*s[p]+0.587*s[p+1]+0.114*s[p+2];
  }
  const integral=new Float64Array((w+1)*(h+1));
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      integral[(y+1)*(w+1)+(x+1)]=
        lum[y*w+x]
        +integral[y*(w+1)+(x+1)]
        +integral[(y+1)*(w+1)+x]
        -integral[y*(w+1)+x];
    }
  }

  const C=8; // constante de ajuste: pixel es negro si está C unidades bajo la media local
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      const x1=Math.max(0,x-radio), y1=Math.max(0,y-radio);
      const x2=Math.min(w-1,x+radio), y2=Math.min(h-1,y+radio);
      const count=(x2-x1)*(y2-y1);
      const sum=integral[(y2+1)*(w+1)+(x2+1)]
               -integral[y1*(w+1)+(x2+1)]
               -integral[(y2+1)*(w+1)+x1]
               +integral[y1*(w+1)+x1];
      const media=sum/count;
      const v=lum[y*w+x]<media-C?0:255;
      const i=(y*w+x)*4;
      d[i]=d[i+1]=d[i+2]=v;d[i+3]=255;
    }
  }
  ctx.putImageData(out,0,0);
}
function blobFromCanvas(canvas){
  const mime=fmtActivo==='png'?'image/png':fmtActivo==='webp'?'image/webp':'image/jpeg';
  const data=canvas.toDataURL(mime,filtros.calidad/100);const bin=atob(data.split(',')[1]);
  const bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  return new Blob([bytes],{type:mime});
}
async function procesarTarjeta(id){
  const t=await dbObtener(id);if(!t?.zipOriginalBlob){setStatus('❌ Sin ZIP original');return;}
  setStatus('⚙️ Procesando…');setProgress(0);
  const zipIn=await JSZip.loadAsync(t.zipOriginalBlob);const zipOut=new JSZip();
  const nombres=Object.keys(zipIn.files).filter(n=>!zipIn.files[n].dir).sort((a,b)=>a.localeCompare(b,undefined,{numeric:true,sensitivity:'base'}));
  for(let i=0;i<nombres.length;i++){
    const nombre=nombres[i];const blob=await zipIn.files[nombre].async('blob');
    if(!blob.type.startsWith('image/')&&!/\.(jpe?g|png|webp|gif|bmp)$/i.test(nombre))continue;
    const url=URL.createObjectURL(blob);
    await new Promise((res,rej)=>{const img=new Image();img.onload=()=>{canvasOff.width=img.naturalWidth;canvasOff.height=img.naturalHeight;canvasOff.getContext('2d').drawImage(img,0,0);URL.revokeObjectURL(url);res();};img.onerror=()=>{URL.revokeObjectURL(url);rej();};img.src=url;}).catch(()=>{});
    const ext=fmtActivo==='png'?'png':fmtActivo==='webp'?'webp':'jpg';
    zipOut.file(nombre.replace(/\.[^.]+$/,'')+'.'+ext,blobFromCanvas(aplicarFiltroACanvas(canvasOff)));
    setProgress(Math.round((i+1)/nombres.length*100));setStatus(`⚙️ ${i+1}/${nombres.length} — ${nombre}`);
  }
  t.zipFiltradoBlob=await zipOut.generateAsync({type:'blob'},m=>setProgress(Math.round(m.percent)));
  t.presetUsado=presetActivo;t.nombreArchivoFilt=`filt_${uuid()}.zip`;
  await dbGuardar(t);setStatus(`✅ Procesado "${t.nombre}"`);setProgress(100);renderGrid();
}

/* ═══ 7. ACCIONES TARJETA ═══ */
async function descargarZipFiltrado(id){
  const t=await dbObtener(id);if(!t?.zipFiltradoBlob){setStatus('❌ Sin ZIP filtrado');return;}
  const url=URL.createObjectURL(t.zipFiltradoBlob);const a=document.createElement('a');a.href=url;a.download=(t.nombre||'filtrado')+'_filtrado.zip';a.click();setTimeout(()=>URL.revokeObjectURL(url),2000);setStatus(`⬇ Descargando "${t.nombre}"`);
}
async function compartirPDF(id){
  const t=await dbObtener(id);
  if(!t?.zipFiltradoBlob){setStatus('❌ Sin ZIP filtrado');return;}
  setStatus('📄 Generando PDF…');setProgress(0);

  const zipIn=await JSZip.loadAsync(t.zipFiltradoBlob);
  const nombres=Object.keys(zipIn.files)
    .filter(n=>!zipIn.files[n].dir&&/\.(jpe?g|png|webp)$/i.test(n))
    .sort((a,b)=>a.localeCompare(b,undefined,{numeric:true,sensitivity:'base'}));

  if(!nombres.length){setStatus('❌ Sin imágenes en el ZIP');return;}

  // Letter: 215.9 × 279.4 mm
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'letter'});
  const PW=215.9, PH=279.4;

  for(let i=0;i<nombres.length;i++){
    const blob=await zipIn.files[nombres[i]].async('blob');

    // Convertir blob → dataURL
    const dataUrl=await new Promise(res=>{
      const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(blob);
    });

    // Dimensiones reales de la imagen
    const dims=await new Promise(res=>{
      const img=new Image();
      img.onload=()=>res({w:img.naturalWidth,h:img.naturalHeight});
      img.src=dataUrl;
    });

    // Escalar para llenar la página manteniendo proporción
    const escH=PH/dims.h, escW=PW/dims.w;
    const esc=Math.min(escH,escW);
    const iW=dims.w*esc, iH=dims.h*esc;
    const offX=(PW-iW)/2, offY=(PH-iH)/2;

    if(i>0)pdf.addPage('letter','portrait');

    const ext=nombres[i].split('.').pop().toLowerCase();
    const fmt=ext==='png'?'PNG':ext==='webp'?'WEBP':'JPEG';
    pdf.addImage(dataUrl,fmt,offX,offY,iW,iH);

    setProgress(Math.round((i+1)/nombres.length*100));
    setStatus(`📄 ${i+1}/${nombres.length} — ${nombres[i]}`);
  }

  // Descargar / compartir
  const pdfBlob=pdf.output('blob');
  const pdfNombre=(t.nombre||'documento')+'.pdf';

  // En móvil intentar Web Share API
  if(navigator.share&&navigator.canShare){
    try{
      const file=new File([pdfBlob],pdfNombre,{type:'application/pdf'});
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:t.nombre});
        setStatus(`✅ PDF compartido — "${t.nombre}"`);
        return;
      }
    }catch(e){if(e.name!=='AbortError')console.warn(e);}
  }

  // Fallback: descarga directa
  const url=URL.createObjectURL(pdfBlob);
  const a=document.createElement('a');a.href=url;a.download=pdfNombre;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),3000);
  setStatus(`✅ PDF descargado — "${t.nombre}"`);
  setProgress(100);
}

async function limpiarOriginal(id){

  if(!confirm(msg))return;t.zipOriginalBlob=null;t.nombreArchivoOrig=null;await dbGuardar(t);setStatus(`🗑 Original eliminado de "${t.nombre}"`);renderGrid();

/* ═══ 8. VISOR 2×6 ═══ */
let _visorNombres=[],_visorZip=null,_visorCursor=0,_visorCargando=false,_visorObserver=null;
let _seleccionadas=new Set(),_visorTarjetaId=null;
const VISOR_BATCH=12;

async function verTarjeta(id){
  _visorTarjetaId=id;_seleccionadas=new Set();_visorCursor=0;_visorCargando=false;
  if(_visorObserver){_visorObserver.disconnect();_visorObserver=null;}
  const t=await dbObtener(id);if(!t)return;
  const zip=t.zipFiltradoBlob||t.zipOriginalBlob;
  const tipo=t.zipFiltradoBlob?'filtrado':'original';
  if(!zip){setStatus('❌ Sin imágenes');return;}
  const body=document.getElementById('visorBody');
  body.innerHTML='<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.5)">⏳ Cargando…</div>';
  document.getElementById('visorTitle').textContent=`${t.nombre} (${tipo})`;
  document.getElementById('visorToolbar').classList.remove('show');
  document.getElementById('visorOverlay').classList.add('show');
  _visorZip=await JSZip.loadAsync(zip);
  _visorNombres=Object.keys(_visorZip.files).filter(n=>!_visorZip.files[n].dir&&/\.(jpe?g|png|webp|gif|bmp)$/i.test(n)).sort((a,b)=>a.localeCompare(b,undefined,{numeric:true,sensitivity:'base'}));
  body.innerHTML='';
  const grid=document.createElement('div');grid.className='visor-grid';grid.id='visorGrid';body.appendChild(grid);
  const sentinel=document.createElement('div');sentinel.className='visor-sentinel';sentinel.id='visorSentinel';grid.appendChild(sentinel);
  await cargarSiguienteLote();
  _visorObserver=new IntersectionObserver(entries=>{if(entries[0].isIntersecting)cargarSiguienteLote();},{rootMargin:'300px'});
  _visorObserver.observe(sentinel);
  setStatus(`✅ ${_visorNombres.length} imágenes — ${tipo}`);
}

function crearImgWrap(blob,nombre){
  const wrap=document.createElement('div');wrap.className='img-wrap';wrap.dataset.nombre=nombre;
  const check=document.createElement('div');check.className='img-check';check.title='Seleccionar';
  check.addEventListener('click',e=>{
    e.stopPropagation();
    if(_seleccionadas.has(nombre)){_seleccionadas.delete(nombre);wrap.classList.remove('selected');}
    else{_seleccionadas.add(nombre);wrap.classList.add('selected');}
    actualizarToolbarVisor();
  });
  const img=document.createElement('img');img.src=URL.createObjectURL(blob);img.alt=nombre;img.title=nombre;
  img.addEventListener('click',e=>{e.stopPropagation();abrirCropManual(nombre);});
  wrap.appendChild(check);wrap.appendChild(img);return wrap;
}

function actualizarToolbarVisor(){
  const n=_seleccionadas.size;const tb=document.getElementById('visorToolbar');
  document.getElementById('vtSelCount').textContent=`${n} seleccionada${n!==1?'s':''}`;
  tb.classList.toggle('show',n>0);
  const total=document.querySelectorAll('#visorGrid .img-wrap').length;
  document.getElementById('btnSelTodas').textContent=(n===total&&total>0)?'☑ Todas':'☐ Todas';
}
function seleccionarTodas(){
  const wraps=document.querySelectorAll('#visorGrid .img-wrap');
  if(_seleccionadas.size===wraps.length&&wraps.length>0){_seleccionadas.clear();wraps.forEach(w=>w.classList.remove('selected'));}
  else{wraps.forEach(w=>{_seleccionadas.add(w.dataset.nombre);w.classList.add('selected');});}
  actualizarToolbarVisor();
}

async function cargarSiguienteLote(){
  if(_visorCargando||_visorCursor>=_visorNombres.length)return;
  _visorCargando=true;
  const grid=document.getElementById('visorGrid');const sentinel=document.getElementById('visorSentinel');
  const loader=document.createElement('div');loader.className='visor-loader';loader.textContent='⏳ Cargando…';
  grid.insertBefore(loader,sentinel);
  const lote=_visorNombres.slice(_visorCursor,_visorCursor+VISOR_BATCH);
  for(const nombre of lote){
    const blob=await _visorZip.files[nombre].async('blob');
    const wrap=crearImgWrap(blob,nombre);
    if(_seleccionadas.has(nombre))wrap.classList.add('selected');
    grid.insertBefore(wrap,loader);
  }
  loader.remove();_visorCursor+=lote.length;
  if(_visorCursor>=_visorNombres.length){
    if(_visorObserver){_visorObserver.disconnect();_visorObserver=null;}
    const fin=document.createElement('div');fin.className='visor-loader';fin.textContent=`✅ ${_visorNombres.length} imágenes`;
    document.getElementById('visorBody').appendChild(fin);
  }
  _visorCargando=false;
}

function cerrarVisor(){
  document.getElementById('visorOverlay').classList.remove('show');
  document.getElementById('visorToolbar').classList.remove('show');
  if(_visorObserver){_visorObserver.disconnect();_visorObserver=null;}
  const body=document.getElementById('visorBody');
  body.querySelectorAll('img').forEach(i=>URL.revokeObjectURL(i.src));body.innerHTML='';
  _visorNombres=[];_visorZip=null;_visorCursor=0;_seleccionadas=new Set();
}

/* ═══ 9. AUTO-CROP ═══ */
async function autoCropSeleccion(){
  if(!_seleccionadas.size){setStatus('❌ Selecciona al menos una imagen');return;}
  const t=await dbObtener(_visorTarjetaId);
  if(!t?.zipFiltradoBlob){setStatus('❌ Necesita ZIP filtrado para recortar');return;}

  const cantSelec=_seleccionadas.size;
  const idTarjeta=_visorTarjetaId;
  const selCopia=new Set(_seleccionadas);

  cerrarVisor();
  setStatus(`✂️ Auto-recortando ${cantSelec} imágenes…`);setProgress(0);

  const zipIn=await JSZip.loadAsync(t.zipFiltradoBlob);
  const zipOut=new JSZip();
  const nombres=Object.keys(zipIn.files).filter(n=>!zipIn.files[n].dir);
  let done=0;
  for(const nombre of nombres){
    const blob=await zipIn.files[nombre].async('blob');
    zipOut.file(nombre, selCopia.has(nombre) ? await autoCropBlob(blob) : blob);
    setProgress(Math.round(++done/nombres.length*100));
    setStatus(`✂️ ${done}/${nombres.length} — ${nombre}`);
  }

  t.zipFiltradoBlob=await zipOut.generateAsync({type:'blob'});
  t.nombreArchivoFilt=`filt_${uuid()}.zip`;
  await dbGuardar(t);
  setStatus(`✅ Auto-recorte aplicado a ${cantSelec} imágenes`);
  setProgress(100);
  renderGrid();
  await verTarjeta(idTarjeta); // ← reabre el visor con el ZIP actualizado
}
function detectarBordesBlanco(ctx,w,h,umbral=245){
  const d=ctx.getImageData(0,0,w,h).data;const eB=i=>d[i]>=umbral&&d[i+1]>=umbral&&d[i+2]>=umbral;
  let top=0,bottom=h-1,left=0,right=w-1;
  outer:for(let y=0;y<h;y++)for(let x=0;x<w;x++){if(!eB((y*w+x)*4)){top=y;break outer;}}
  outer:for(let y=h-1;y>=0;y--)for(let x=0;x<w;x++){if(!eB((y*w+x)*4)){bottom=y;break outer;}}
  outer:for(let x=0;x<w;x++)for(let y=0;y<h;y++){if(!eB((y*w+x)*4)){left=x;break outer;}}
  outer:for(let x=w-1;x>=0;x--)for(let y=0;y<h;y++){if(!eB((y*w+x)*4)){right=x;break outer;}}
  const p=4;return{x:Math.max(0,left-p),y:Math.max(0,top-p),w:Math.min(w,right-left+1+p*2),h:Math.min(h,bottom-top+1+p*2)};
}
function autoCropBlob(blob){
  return new Promise(res=>{
    const url=URL.createObjectURL(blob);const img=new Image();
    img.onload=()=>{
      URL.revokeObjectURL(url);

      // Guardar estado del crop manual y usar la imagen temporalmente
      const prevEl=_cropImgEl, prevW=_cropImgW, prevH=_cropImgH, prevEsq=[..._esquinas];

      _cropImgEl=img; _cropImgW=img.naturalWidth; _cropImgH=img.naturalHeight;
      _detectarBordesDocumento(); // reutiliza la misma detección del crop manual

      // Bounding box de las 4 esquinas detectadas
      const xs=_esquinas.map(e=>e.x), ys=_esquinas.map(e=>e.y);
      const x1=Math.round(Math.min(...xs)), y1=Math.round(Math.min(...ys));
      const rw=Math.round(Math.max(...xs))-x1, rh=Math.round(Math.max(...ys))-y1;

      // Restaurar estado anterior
      _cropImgEl=prevEl; _cropImgW=prevW; _cropImgH=prevH; _esquinas=prevEsq;

      // Recortar
      const c=document.createElement('canvas');c.width=img.naturalWidth;c.height=img.naturalHeight;
      c.getContext('2d').drawImage(img,0,0);
      const o=document.createElement('canvas');
      o.width=rw||img.naturalWidth; o.height=rh||img.naturalHeight;
      o.getContext('2d').drawImage(c,x1,y1,o.width,o.height,0,0,o.width,o.height);
      const mime=fmtActivo==='png'?'image/png':fmtActivo==='webp'?'image/webp':'image/jpeg';
      o.toBlob(b=>res(b),mime,filtros.calidad/100);
    };img.src=url;
  });
}

/* ═══ 10. CROP MANUAL ═══ */
let _cropNombre=null,_cropImgEl=null,_cropImgW=0,_cropImgH=0,_dragging=null;
let _esquinas=[{x:0,y:0},{x:0,y:0},{x:0,y:0},{x:0,y:0}];
let _cropLista=[],_cropIdx=0;

function _esquinaDefecto(){
  const p=0.05,w=_cropImgW,h=_cropImgH;
  _esquinas=[{x:Math.round(w*p),y:Math.round(h*p)},{x:Math.round(w-w*p),y:Math.round(h*p)},{x:Math.round(w-w*p),y:Math.round(h-h*p)},{x:Math.round(w*p),y:Math.round(h-h*p)}];
}

// Detecta el borde del documento (transición oscuro→claro) en la imagen real
function _detectarBordesDocumento(){
  // Dibuja la imagen en un canvas temporal para leer pixels
  const tmp=document.createElement('canvas');
  tmp.width=_cropImgW;tmp.height=_cropImgH;
  const ctx=tmp.getContext('2d');
  ctx.drawImage(_cropImgEl,0,0);
  const d=ctx.getImageData(0,0,_cropImgW,_cropImgH).data;
  const W=_cropImgW,H=_cropImgH;
  const umbral=180; // pixel más oscuro que esto = borde del documento
  const esClaro=(x,y)=>{const i=(y*W+x)*4;return d[i]>umbral&&d[i+1]>umbral&&d[i+2]>umbral;};

  // Buscar desde cada lado hacia el centro hasta encontrar pixel claro
  // TOP: bajar desde arriba por el centro horizontal
  let top=Math.round(H*0.03);
  for(let y=0;y<Math.round(H*0.4);y++){
    if(esClaro(Math.round(W/2),y)){top=y;break;}
  }
  // BOTTOM: subir desde abajo
  let bottom=Math.round(H*0.97);
  for(let y=H-1;y>Math.round(H*0.6);y--){
    if(esClaro(Math.round(W/2),y)){bottom=y;break;}
  }
  // LEFT: avanzar desde izquierda
  let left=Math.round(W*0.03);
  for(let x=0;x<Math.round(W*0.4);x++){
    if(esClaro(x,Math.round(H/2))){left=x;break;}
  }
  // RIGHT: retroceder desde derecha
  let right=Math.round(W*0.97);
  for(let x=W-1;x>Math.round(W*0.6);x--){
    if(esClaro(x,Math.round(H/2))){right=x;break;}
  }

  // Pequeño padding interior
  const pad=Math.round(Math.min(W,H)*0.008);
  top=Math.max(0,top+pad);
  bottom=Math.min(H-1,bottom-pad);
  left=Math.max(0,left+pad);
  right=Math.min(W-1,right-pad);

  // Verificar que tenga sentido (área mínima 20% de la imagen)
  if((right-left)<W*0.2||(bottom-top)<H*0.2){
    _esquinaDefecto(); return;
  }

  _esquinas=[
    {x:left,  y:top},
    {x:right, y:top},
    {x:right, y:bottom},
    {x:left,  y:bottom},
  ];
}

// Snap: al soltar una esquina, la acerca al borde blanco más cercano en su zona
function _snapEsquina(idx){
  const e=_esquinas[idx];
  const W=_cropImgW,H=_cropImgH;
  const tmp=document.createElement('canvas');tmp.width=W;tmp.height=H;
  const ctx=tmp.getContext('2d');ctx.drawImage(_cropImgEl,0,0);
  const d=ctx.getImageData(0,0,W,H).data;
  const umbral=170;
  const esClaro=(x,y)=>{
    x=Math.max(0,Math.min(W-1,Math.round(x)));y=Math.max(0,Math.min(H-1,Math.round(y)));
    const i=(y*W+x)*4;return d[i]>umbral&&d[i+1]>umbral&&d[i+2]>umbral;
  };

  const ZONA=Math.round(Math.min(W,H)*0.12); // radio de búsqueda
  let bestX=e.x,bestY=e.y;

  // Buscar el borde más cercano en X (horizontal): escanear desde el punto hacia los lados
  // Dirección X: si la esquina es izquierda (idx 0,3) busca hacia izquierda, si derecha (1,2) hacia derecha
  const haciaIzq=(idx===0||idx===3);
  const haciaArr=(idx===0||idx===1);

  // Snap horizontal
  const stepX=haciaIzq?-1:1;
  for(let dx=0;dx<=ZONA;dx++){
    const x=Math.round(e.x+dx*stepX);
    if(x<0||x>=W)break;
    // Transición: oscuro→claro o claro→oscuro
    const actual=esClaro(x,e.y);
    const anterior=esClaro(x-stepX,e.y);
    if(actual!==anterior){bestX=x;break;}
  }

  // Snap vertical
  const stepY=haciaArr?-1:1;
  for(let dy=0;dy<=ZONA;dy++){
    const y=Math.round(e.y+dy*stepY);
    if(y<0||y>=H)break;
    const actual=esClaro(e.x,y);
    const anterior=esClaro(e.x,y-stepY);
    if(actual!==anterior){bestY=y;break;}
  }

  _esquinas[idx]={x:Math.max(0,Math.min(W-1,bestX)),y:Math.max(0,Math.min(H-1,bestY))};
}

// Convierte evento → coords reales de imagen
function _evToImg(e){
  const canvas=document.getElementById('cropCanvas');const rect=canvas.getBoundingClientRect();
  const src=e.touches?e.touches[0]:e;
  return{
    x:Math.max(0,Math.min(_cropImgW,(src.clientX-rect.left)*(_cropImgW/rect.width))),
    y:Math.max(0,Math.min(_cropImgH,(src.clientY-rect.top)*(_cropImgH/rect.height))),
  };
}

// Devuelve {tipo:'esquina',idx} o {tipo:'medio',idx} o null
// Lados: 0=top(TL-TR), 1=right(TR-BR), 2=bottom(BR-BL), 3=left(BL-TL)
function _hitPunto(ix,iy){
  const canvas=document.getElementById('cropCanvas');const rect=canvas.getBoundingClientRect();
  const r=28*(_cropImgW/rect.width);
  // Primero esquinas (prioridad)
  for(let i=0;i<4;i++){
    if(Math.hypot(_esquinas[i].x-ix,_esquinas[i].y-iy)<r)return{tipo:'esquina',idx:i};
  }
  // Luego puntos medios de cada lado
  for(let i=0;i<4;i++){
    const a=_esquinas[i],b=_esquinas[(i+1)%4];
    const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
    if(Math.hypot(mx-ix,my-iy)<r)return{tipo:'medio',idx:i};
  }
  return null;
}

function _dibujarCrop(){
  const canvas=document.getElementById('cropCanvas');if(!canvas||!_cropImgEl)return;
  const ctx=canvas.getContext('2d');const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);ctx.drawImage(_cropImgEl,0,0,W,H);
  // Overlay oscuro fuera
  ctx.save();ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='destination-out';
  ctx.beginPath();ctx.moveTo(_esquinas[0].x,_esquinas[0].y);
  for(let i=1;i<4;i++)ctx.lineTo(_esquinas[i].x,_esquinas[i].y);
  ctx.closePath();ctx.fill();ctx.restore();
  // Bordes
  const lw=Math.max(3,W/180);
  ctx.strokeStyle='#00e5b0';ctx.lineWidth=lw;
  ctx.beginPath();ctx.moveTo(_esquinas[0].x,_esquinas[0].y);
  for(let i=1;i<4;i++)ctx.lineTo(_esquinas[i].x,_esquinas[i].y);
  ctx.closePath();ctx.stroke();
  // Puntos medios
  for(let i=0;i<4;i++){
    const a=_esquinas[i],b=_esquinas[(i+1)%4];
    ctx.beginPath();ctx.arc((a.x+b.x)/2,(a.y+b.y)/2,Math.max(6,W/100),0,Math.PI*2);
    ctx.fillStyle='rgba(0,229,176,0.75)';ctx.fill();
  }
  // Esquinas
  const r=Math.max(18,W/50);
  _esquinas.forEach(e=>{
    ctx.beginPath();ctx.arc(e.x,e.y,r,0,Math.PI*2);ctx.fillStyle='#00e5b0';ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=lw;ctx.stroke();
    const arm=r*0.45;
    ctx.beginPath();ctx.moveTo(e.x-arm,e.y);ctx.lineTo(e.x+arm,e.y);ctx.moveTo(e.x,e.y-arm);ctx.lineTo(e.x,e.y+arm);
    ctx.strokeStyle='#fff';ctx.lineWidth=lw*0.8;ctx.stroke();
  });
}

function _cargarCropBlob(blob){
  return new Promise(res=>{
    const url=URL.createObjectURL(blob);const img=new Image();
    img.onload=()=>{
      URL.revokeObjectURL(url);_cropImgEl=img;_cropImgW=img.naturalWidth;_cropImgH=img.naturalHeight;
      const canvas=document.getElementById('cropCanvas');
      canvas.width=_cropImgW;canvas.height=_cropImgH;
      const sc=Math.min(window.innerWidth/_cropImgW,(window.innerHeight-112)/_cropImgH,1);
      canvas.style.width=Math.round(_cropImgW*sc)+'px';canvas.style.height=Math.round(_cropImgH*sc)+'px';
      _detectarBordesDocumento(); // ← auto-detección al abrir
      _dibujarCrop();res();
    };img.src=url;
  });
}

async function abrirCropManual(nombre){
  if(!_visorZip)return;
  _cropLista=_visorNombres.slice();
  _cropIdx=Math.max(0,_cropLista.indexOf(nombre));
  await _navegarCrop(0);
  document.getElementById('cropOverlay').classList.add('show');
}

async function _navegarCrop(delta){
  const sig=_cropIdx+delta;if(sig<0||sig>=_cropLista.length)return;
  _cropIdx=sig;_cropNombre=_cropLista[_cropIdx];
  document.getElementById('cropNombreLabel').textContent=`${_cropIdx+1} / ${_cropLista.length}  —  ${_cropNombre.replace(/\.[^.]+$/,'')}`;
  const blob=await _visorZip.files[_cropNombre].async('blob');
  await _cargarCropBlob(blob);
}

function resetCropEsquinas(){_detectarBordesDocumento();_dibujarCrop();}

// _dragging: {tipo:'esquina',idx} | {tipo:'medio',idx} | null
const _cCanvas=document.getElementById('cropCanvas');

function _aplicarDrag(p){
  if(!_dragging)return;
  if(_dragging.tipo==='esquina'){
    _esquinas[_dragging.idx]={x:p.x,y:p.y};
  } else {
    // Punto medio del lado idx: mueve las 2 esquinas del lado en el eje correspondiente
    const i=_dragging.idx;
    const a=i,b=(i+1)%4; // índices de las dos esquinas del lado
    // Lados 0(top) y 2(bottom) → mover en Y
    // Lados 1(right) y 3(left) → mover en X
    if(i===0||i===2){
      _esquinas[a].y=p.y;_esquinas[b].y=p.y;
    } else {
      _esquinas[a].x=p.x;_esquinas[b].x=p.x;
    }
  }
  _dibujarCrop();
}

function _finDrag(){
  if(!_dragging)return;
  if(_dragging.tipo==='esquina'){
    _snapEsquina(_dragging.idx);_dibujarCrop();
  }
  // Los puntos medios no hacen snap (ya mueven el lado entero)
  _dragging=null;
}

_cCanvas.addEventListener('mousedown',e=>{
  e.preventDefault();const p=_evToImg(e);_dragging=_hitPunto(p.x,p.y);
});
_cCanvas.addEventListener('touchstart',e=>{
  e.preventDefault();const p=_evToImg(e);_dragging=_hitPunto(p.x,p.y);
},{passive:false});
window.addEventListener('mousemove',e=>{
  if(!_dragging)return;_aplicarDrag(_evToImg(e));
});
window.addEventListener('touchmove',e=>{
  if(!_dragging)return;e.preventDefault();_aplicarDrag(_evToImg(e));
},{passive:false});
window.addEventListener('mouseup',()=>_finDrag());
window.addEventListener('touchend',()=>_finDrag());

// Buffer de ediciones en memoria: Map<nombre, blob>
let _editBuffer = new Map();

async function aplicarCropAlBuffer(){
  const xs=_esquinas.map(e=>e.x),ys=_esquinas.map(e=>e.y);
  const x1=Math.round(Math.min(...xs)),y1=Math.round(Math.min(...ys));
  const rw=Math.round(Math.max(...xs))-x1,rh=Math.round(Math.max(...ys))-y1;
  if(rw<10||rh<10){setStatus('❌ Área muy pequeña');return;}

  // Obtener blob base: del buffer si ya fue editada, si no del ZIP original
  const blobBase = _editBuffer.has(_cropNombre)
    ? _editBuffer.get(_cropNombre)
    : await _getBlobDelZip(_cropNombre);

  const rect={x:x1,y:y1,w:rw,h:rh};
  const recortado = await _doCropBlob(blobBase, rect);
  _editBuffer.set(_cropNombre, recortado);

  // Marcar visualmente en el label
  setStatus(`📌 "${_cropNombre}" en buffer (${_editBuffer.size} pendiente${_editBuffer.size!==1?'s':''})`);

  // Actualizar la imagen en el canvas para ver el resultado
  await _cargarCropBlob(recortado);
}

async function _getBlobDelZip(nombre){
  if(!_visorZip)return null;
  return await _visorZip.files[nombre].async('blob');
}

async function guardarBufferYCerrar(){
  if(!_editBuffer.size){descartarBufferYCerrar();return;}
  const t=await dbObtener(_visorTarjetaId);
  if(!t?.zipFiltradoBlob){setStatus('❌ Sin ZIP filtrado');return;}

  setStatus(`💾 Guardando ${_editBuffer.size} edición${_editBuffer.size!==1?'es':''}…`);setProgress(0);
  const zipIn=await JSZip.loadAsync(t.zipFiltradoBlob);
  const zipOut=new JSZip();
  const nombres=Object.keys(zipIn.files).filter(n=>!zipIn.files[n].dir);
  let done=0;
  for(const nombre of nombres){
    const blob = _editBuffer.has(nombre)
      ? _editBuffer.get(nombre)
      : await zipIn.files[nombre].async('blob');
    zipOut.file(nombre, blob);
    setProgress(Math.round(++done/nombres.length*100));
  }
  t.zipFiltradoBlob=await zipOut.generateAsync({type:'blob'});
  t.nombreArchivoFilt=`filt_${uuid()}.zip`;
  await dbGuardar(t);
  setStatus(`✅ ${_editBuffer.size} edición${_editBuffer.size!==1?'es':''} guardada${_editBuffer.size!==1?'s':''}`);
  setProgress(100);
  _editBuffer.clear();
  cerrarCropManual();
  renderGrid();
  await verTarjeta(_visorTarjetaId);
}

function descartarBufferYCerrar(){
  if(_editBuffer.size>0){
    if(!confirm(`Hay ${_editBuffer.size} edición${_editBuffer.size!==1?'es':''} sin guardar. ¿Descartar?`))return;
  }
  _editBuffer.clear();
  cerrarCropManual();
}

function _doCropBlob(blob,rect){
  return new Promise(res=>{
    const url=URL.createObjectURL(blob);const img=new Image();
    img.onload=()=>{
      const out=document.createElement('canvas');out.width=rect.w;out.height=rect.h;
      out.getContext('2d').drawImage(img,rect.x,rect.y,rect.w,rect.h,0,0,rect.w,rect.h);
      URL.revokeObjectURL(url);
      const mime=fmtActivo==='png'?'image/png':fmtActivo==='webp'?'image/webp':'image/jpeg';
      out.toBlob(b=>res(b),mime,filtros.calidad/100);
    };img.src=url;
  });
}

function cerrarCropManual(){
  document.getElementById('cropOverlay').classList.remove('show');
  _dragging=null;_cropImgEl=null;_cropNombre=null;
  _editBuffer.clear();
}

// Al navegar entre imágenes en el crop, usar el buffer si existe
const _navegarCropOrig=_navegarCrop;
async function _navegarCrop(delta){
  const sig=_cropIdx+delta;if(sig<0||sig>=_cropLista.length)return;
  _cropIdx=sig;_cropNombre=_cropLista[_cropIdx];
  document.getElementById('cropNombreLabel').textContent=
    `${_cropIdx+1} / ${_cropLista.length}  —  ${_cropNombre.replace(/\.[^.]+$/,'')}${_editBuffer.has(_cropNombre)?' 📌':''}`;
  // Usar blob del buffer si ya fue editado, si no del ZIP
  const blob = _editBuffer.has(_cropNombre)
    ? _editBuffer.get(_cropNombre)
    : await _visorZip.files[_cropNombre].async('blob');
  await _cargarCropBlob(blob);
}

/* ── Rotar imágenes seleccionadas ── */
async function rotarSeleccion(grados){
  if(!_seleccionadas.size){setStatus('❌ Selecciona imágenes primero');return;}
  const t=await dbObtener(_visorTarjetaId);
  if(!t?.zipFiltradoBlob){setStatus('❌ Necesita ZIP filtrado');return;}
  const cantSelec=_seleccionadas.size;
  const idTarjeta=_visorTarjetaId;
  const selCopia=new Set(_seleccionadas);

  cerrarVisor();
  setStatus(`↻ Rotando ${cantSelec} imágenes…`);setProgress(0);

  const zipIn=await JSZip.loadAsync(t.zipFiltradoBlob);
  const zipOut=new JSZip();
  const nombres=Object.keys(zipIn.files).filter(n=>!zipIn.files[n].dir);
  let done=0;
  for(const nombre of nombres){
    const blob=await zipIn.files[nombre].async('blob');
    zipOut.file(nombre, selCopia.has(nombre) ? await _rotarBlob(blob,grados) : blob);
    setProgress(Math.round(++done/nombres.length*100));
    setStatus(`↻ ${done}/${nombres.length} — ${nombre}`);
  }
  t.zipFiltradoBlob=await zipOut.generateAsync({type:'blob'});
  t.nombreArchivoFilt=`filt_${uuid()}.zip`;
  await dbGuardar(t);
  setStatus(`✅ ${cantSelec} imágenes rotadas ${grados>0?'+':''}${grados}°`);
  setProgress(100);
  renderGrid();
  await verTarjeta(idTarjeta);
}

function _rotarBlob(blob,grados){
  return new Promise(res=>{
    const url=URL.createObjectURL(blob);const img=new Image();
    img.onload=()=>{
      const rad=grados*Math.PI/180;
      const sin=Math.abs(Math.sin(rad)),cos=Math.abs(Math.cos(rad));
      const W=Math.round(img.naturalWidth*cos+img.naturalHeight*sin);
      const H=Math.round(img.naturalWidth*sin+img.naturalHeight*cos);
      const c=document.createElement('canvas');c.width=W;c.height=H;
      const ctx=c.getContext('2d');
      ctx.translate(W/2,H/2);ctx.rotate(rad);
      ctx.drawImage(img,-img.naturalWidth/2,-img.naturalHeight/2);
      URL.revokeObjectURL(url);
      const mime=fmtActivo==='png'?'image/png':fmtActivo==='webp'?'image/webp':'image/jpeg';
      c.toBlob(b=>res(b),mime,filtros.calidad/100);
    };img.src=url;
  });
}

/* ═══ 11. RENDER GRID ═══ */
async function renderGrid(){
  const grid=document.getElementById('cardsGrid');
  const tarjetas=(await dbListar()).sort((a,b)=>b.fecha-a.fecha);
  if(!tarjetas.length){grid.innerHTML='<div class="empty-state"><div class="es-icon">📂</div><p>Sin tarjetas aún.<br>Crea una nueva para comenzar.</p></div>';return;}
  grid.innerHTML='';
  for(const t of tarjetas){
    const tieneOrig=!!t.zipOriginalBlob,tieneFilt=!!t.zipFiltradoBlob;
    const card=document.createElement('div');card.className='card';
    card.innerHTML=`
      <div class="card-preview" onclick="verTarjeta('${t.id}')"><div class="preview-placeholder">📄</div></div>
      <div class="card-body">
        <div class="card-name" onclick="renombrarTarjeta('${t.id}',this)">${t.nombre}</div>
        <div class="card-meta">${fechaCorta(t.fecha)}</div>
        <div class="card-badges">
          ${tieneOrig?'<span class="badge badge-original">📦 Original</span>':'<span class="badge badge-vacio">📦 Sin original</span>'}
          ${tieneFilt?`<span class="badge badge-filtrado">✅ Filtrado${t.presetUsado?' · '+t.presetUsado:''}</span>`:'<span class="badge badge-vacio">— Sin filtrado</span>'}
        </div>
      
      <div class="card-actions">
          <button class="btn-card btn-process" onclick="procesarTarjeta('${t.id}')" ${!tieneOrig?'disabled':''}>⚡ Procesar</button>
          <div class="card-menu-wrap">
            <button class="card-menu-btn" onclick="toggleCardMenu(this)">···</button>
            <div class="card-menu-dropdown">
              <button class="card-menu-item" onclick="verTarjeta('${t.id}');cerrarCardMenus()" ${!tieneFilt&&!tieneOrig?'disabled':''}>👁 Ver imágenes</button>
              <button class="card-menu-item" onclick="descargarZipFiltrado('${t.id}');cerrarCardMenus()" ${!tieneFilt?'disabled':''}>⬇ Descargar ZIP</button>
              <button class="card-menu-item" onclick="compartirPDF('${t.id}');cerrarCardMenus()" ${!tieneFilt?'disabled':''}>📄 Exportar PDF</button>
              <div class="card-menu-sep"></div>
              <button class="card-menu-item danger" onclick="limpiarOriginal('${t.id}');cerrarCardMenus()" ${!tieneOrig?'disabled':''}>🗑 Borrar original</button>
              <button class="card-menu-item danger" onclick="eliminarTarjeta('${t.id}');cerrarCardMenus()">✕ Eliminar tarjeta</button>
            </div>
          </div>
        </div>
        
        
      </div>`;
    grid.appendChild(card);
    generarMiniatura(t,card.querySelector('.card-preview'));
  }
}

async function generarMiniatura(t,el){
  const zip=t.zipFiltradoBlob||t.zipOriginalBlob;if(!zip)return;
  try{
    const z=await JSZip.loadAsync(zip);
    const nombres=Object.keys(z.files).filter(n=>!z.files[n].dir&&/\.(jpe?g|png|webp)$/i.test(n)).sort((a,b)=>a.localeCompare(b,undefined,{numeric:true,sensitivity:'base'}));
    if(!nombres.length)return;
    const blob=await z.files[nombres[0]].async('blob');const url=URL.createObjectURL(blob);
    const img=document.createElement('img');img.src=url;
    img.onload=()=>{el.querySelector('.preview-placeholder')?.remove();el.appendChild(img);};
  }catch(e){}
}

/* ═══ 12. IMPORTAR ═══ */
function importarZip(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.zip';inp.multiple=true;
  inp.onchange=async()=>{
    const files=Array.from(inp.files);if(!files.length)return;
    for(const f of files){setStatus(`📦 Importando "${f.name}"…`);await crearTarjetaDesdeZip(f);}
    renderGrid();
  };inp.click();
}
function importarImagenes(){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.multiple=true;
  inp.onchange=async()=>{
    const files=Array.from(inp.files);if(!files.length)return;
    const nombre=prompt('Nombre para esta tarjeta:','Documento '+new Date().toLocaleDateString('es-SV'));
    if(!nombre)return;
    setStatus(`🖼️ Empaquetando ${files.length} imágenes…`);await crearTarjetaDesdeImagenes(files,nombre.trim());renderGrid();
  };inp.click();
}

function cerrarModalNueva(){document.getElementById('modalNueva').classList.remove('show');}
document.getElementById('modalNueva').addEventListener('click',e=>{if(e.target===document.getElementById('modalNueva'))cerrarModalNueva();});

updateLabels();syncSliders();renderGrid();
